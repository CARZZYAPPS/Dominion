<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dominion: Infinite Frontiers</title>
    <style>
        body { background: #1a1a2e; color: #e9e9e9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; padding: 20px; }
        #game-container { background: #16213e; border: 2px solid #4ecca3; border-radius: 10px; width: 600px; padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .header { text-align: center; border-bottom: 1px solid #4ecca3; padding-bottom: 10px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; background: #0f3460; padding: 15px; border-radius: 5px; }
        .stat-item { font-weight: bold; color: #4ecca3; }
        .log { height: 150px; background: #000; padding: 10px; overflow-y: auto; font-family: monospace; font-size: 13px; border-radius: 5px; margin-bottom: 20px; color: #00ff41; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: #4ecca3; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; color: #1a1a2e; transition: 0.3s; }
        button:hover { background: #45b393; transform: scale(1.02); }
        button:disabled { background: #555; cursor: not-allowed; }
        .terrain-tag { display: inline-block; padding: 2px 8px; border-radius: 3px; background: #e94560; color: white; font-size: 12px; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">
        <h1>DOMINION</h1>
        <p>Infinite Frontiers • <span id="level-display">Level 1</span></p>
    </div>

    <div class="stats-grid">
        <div class="stat-item">💰 Primary: <span id="res-val">100</span></div>
        <div class="stat-item">🥫 Food Stamps: <span id="food-val">20</span></div>
        <div class="stat-item">⚔️ Army: <span id="army-val">5</span></div>
        <div class="stat-item">🛡️ Defense: <span id="def-val">10</span></div>
        <div class="stat-item">✨ XP: <span id="xp-val">0</span> / 100</div>
        <div class="stat-item">🔩 Alloy: <span id="alloy-val">0</span></div>
    </div>

    <div id="game-log" class="log">Welcome, Commander. Check your borders...</div>

    <div class="actions">
        <button onclick="battle()">Deploy to Battle</button>
        <button onclick="buySupplies()">Buy Supplies (20 Primary)</button>
        <button onclick="fortify()">Upgrade Fortress (50 Alloy)</button>
        <button onclick="resetGame()" style="background:#e94560; color:white;">Reset Save</button>
    </div>
</div>

<script>
    // Game State
    let state = {
        level: 1, res: 100, food: 20, army: 5, def: 10, xp: 0, alloy: 0, lastLogin: Date.now()
    };

    // Page 13: Terrain Types
    const terrains = [
        { name: "High Ground", atk: 1.5, def: 1.2 },
        { name: "Choke Point", atk: 0.8, def: 2.0 },
        { name: "Open Plains", atk: 1.0, def: 1.0 },
        { name: "Deep Space", atk: 1.2, def: 0.8 }
    ];

    function updateUI() {
        document.getElementById('level-display').innerText = "Level " + state.level;
        document.getElementById('res-val').innerText = Math.floor(state.res);
        document.getElementById('food-val').innerText = state.food;
        document.getElementById('army-val').innerText = state.army;
        document.getElementById('def-val').innerText = state.def;
        document.getElementById('xp-val').innerText = state.xp;
        document.getElementById('alloy-val').innerText = state.alloy;
        localStorage.setItem('dominion_save', JSON.stringify(state));
    }

    function log(msg) {
        const logBox = document.getElementById('game-log');
        logBox.innerHTML += `<div>> ${msg}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    // Page 6 & 11: Battle Logic
    function battle() {
        if(state.army <= 0) return log("No soldiers left!");
        if(state.food <= 0) return log("Army too hungry to fight! Buy Food Stamps.");

        const terrain = terrains[Math.floor(Math.random() * terrains.length)];
        let power = (state.army * 10) * terrain.atk;
        let enemy = (10 + (state.level * 15)) * (Math.random() + 0.5);

        log(`Deploying to <span class="terrain-tag">${terrain.name}</span>...`);
        state.food -= 2; // Upkeep Pressure (p. 23)

        if(power > enemy) {
            let winRes = 30 + (state.level * 5);
            let winXP = 20;
            let winAlloy = 5;
            state.res += winRes;
            state.xp += winXP;
            state.alloy += winAlloy;
            log(`VICTORY! Gained ${winRes} Credits and ${winAlloy} Alloy.`);
            checkLevelUp();
        } else {
            state.army--;
            log("DEFEAT! A soldier was lost in the field.");
        }
        updateUI();
    }

    function checkLevelUp() {
        let target = state.level * 100;
        if(state.xp >= target) {
            state.level++;
            state.xp = 0;
            log(`*** LEVEL UP! Unlocked Level ${state.level} content. ***`);
        }
    }

    function buySupplies() {
        if(state.res >= 20) {
            state.res -= 20;
            state.army += 2;
            state.food += 15;
            log("Recruited 2 soldiers and restocked Food Stamps.");
            updateUI();
        } else {
            log("Not enough Primary Currency!");
        }
    }

    function fortify() {
        if(state.alloy >= 50) {
            state.alloy -= 50;
            state.def += 15;
            log("Fortress reinforced! Defense increased.");
            updateUI();
        } else {
            log("Need 50 Alloy for upgrades.");
        }
    }

    // Page 39: Offline Vulnerability
    function checkOffline() {
        const now = Date.now();
        const diff = (now - state.lastLogin) / 1000; // seconds
        if(diff > 60) {
            const attacks = Math.min(Math.floor(diff / 60), 5);
            log(`OFFLINE ALERT: You were away. Checking for raids...`);
            for(let i=0; i<attacks; i++) {
                if(Math.random() < 0.3) {
                    let raidPower = Math.random() * 30;
                    if(raidPower > state.def) {
                        state.army = Math.max(0, state.army - 1);
                        log("RAID: Defense breached! Lost 1 soldier.");
                    } else {
                        log("RAID: Your defenses repelled an attacker!");
                    }
                }
            }
        }
        state.lastLogin = now;
        updateUI();
    }

    function resetGame() {
        localStorage.removeItem('dominion_save');
        location.reload();
    }

    // Initialize
    const saved = localStorage.getItem('dominion_save');
    if(saved) state = JSON.parse(saved);
    checkOffline();
    setInterval(() => { state.lastLogin = Date.now(); updateUI(); }, 10000);
</script>

</body>
</html>
